{# mailing/templates/mailing/message_confirm_delete.html #}
{% extends 'catalog/base.html' %}

{% block title %}Удалить сообщение{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Удалить сообщение</h1>
    <p class="lead">Вы уверены, что хотите удалить сообщение "{{ object.subject }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger me-2">Да, удалить</button>
        <a href="{% url 'mailing:message_detail' pk=object.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
