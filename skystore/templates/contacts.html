<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Контакты - Skystore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f3f3f3, #ffffff);
        }
        .navbar {
            background-color: #007bff;
        }
        .navbar a {
            color: white !important;
        }
        .card {
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        footer {
            background-color: #007bff;
            color: white;
            padding: 20px 0;
        }
        footer a {
            color: white;
        }
    </style>
</head>
<body>
{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-success" role="alert">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Skystore</a>
        <div>
            <a class="btn btn-outline-light" href="/">Каталог</a>
            <a class="btn btn-outline-light" href="/contacts/">Контакты</a>
        </div>
    </div>
</nav>

<div class="container text-center py-5">
    <h1 class="display-4">Контакты</h1>
    <p class="lead">Свяжитесь с нами удобным для вас способом.</p>
</div>

<div class="container">
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-4">Наши контактные данные</h4>
                    <table class="table table-striped">
                        <tr>
                            <td><strong>Страна</strong></td>
                            <td>USA</td>
                        </tr>
                        <tr>
                            <td><strong>ИНН</strong></td>
                            <td>91-1144442</td>
                        </tr>
                        <tr>
                            <td><strong>Адрес</strong></td>
                            <td>Redmond, WA, 98052-6399</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="my-0 font-weight-normal">Свяжитесь с нами</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя</label>
                            <input type="text" name="name" class="form-control" id="name" placeholder="Ваше имя" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Телефон</label>
                            <input type="text" name="phone" class="form-control" id="phone" placeholder="Контактный телефон" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Сообщение</label>
                            <textarea name="message" class="form-control" id="message" placeholder="Ваше сообщение" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-lg btn-primary w-100">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5">
    <div class="container">
        <h5>SkyStore</h5>
        <small class="d-block mb-3">&copy; 2023</small>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
