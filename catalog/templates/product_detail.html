{% extends 'base.html' %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <h1>{{ product.name }}</h1>
    {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-fluid">
    {% else %}
        <img src="/static/default-image.jpg" alt="Нет изображения" class="img-fluid">
    {% endif %}
    <p>{{ product.description }}</p>
    <h2>{{ product.price }}₽</h2>
</div>
{% endblock %}
