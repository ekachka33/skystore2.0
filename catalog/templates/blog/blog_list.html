{% extends 'catalog/base.html' %}
{% load static %}

{% block title %}Список блогов{% endblock %}

{% block content %}
<div class="container">
    <h1>Список блогов</h1>
    <ul>
        {% for post in object_list %}
            <li>
                <a href="{% url 'blog:blog_detail' post.pk %}">{{ post.title }}</a>
            </li>
        {% endfor %}
    </ul>
    <a href="{% url 'blog:blog_create' %}" class="btn btn-primary">Добавить новый блог</a>
</div>
{% endblock %}
